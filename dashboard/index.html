<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Audit Ledger — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --border:    #e4e0da;
      --accent:    #2d6a4f;
      --accent-lt: #e8f4ee;
      --danger:    #c0392b;
      --text:      #1a1a1a;
      --muted:     #6b6b6b;
      --mono:      'Courier New', monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Config screen ─────────────────────────────────────────────────────── */
    #config-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .config-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .config-card h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .config-card p  { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 18px;
      background: var(--bg);
      color: var(--text);
    }

    input:focus { outline: 2px solid var(--accent); border-color: transparent; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; justify-content: center; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger  { background: var(--danger); color: #fff; }

    /* ── App shell ──────────────────────────────────────────────────────────── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 1rem; font-weight: 700; flex: 1; }

    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--accent-lt);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Toolbar ────────────────────────────────────────────────────────────── */
    .toolbar {
      padding: 16px 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .toolbar label { margin-bottom: 0; font-weight: 500; font-size: 0.85rem; }

    .toolbar input[type="date"] {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 0;
      width: auto;
    }

    .spacer { flex: 1; }

    #error-bar {
      display: none;
      background: #fdecea;
      color: var(--danger);
      padding: 10px 28px;
      font-size: 0.85rem;
      border-bottom: 1px solid #f5c6c2;
    }

    /* ── Table ──────────────────────────────────────────────────────────────── */
    .table-wrap {
      padding: 24px 28px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--accent-lt); }

    td {
      padding: 11px 14px;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill-yes  { background: #d4edda; color: #155724; }
    .pill-no   { background: #f8d7da; color: #721c24; }

    #empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    #loading-row td { text-align: center; color: var(--muted); padding: 40px; }

    /* ── Detail panel ───────────────────────────────────────────────────────── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
    }

    #panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 520px;
      max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }

    #panel.open { transform: translateX(0); }

    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-header h2 { font-size: 1rem; flex: 1; }

    .panel-body { flex: 1; overflow-y: auto; padding: 24px; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 20px 0 10px;
    }
    .section-title:first-child { margin-top: 0; }

    .field-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .field-label { color: var(--muted); min-width: 160px; }
    .field-value { font-family: var(--mono); font-size: 0.8rem; word-break: break-all; }

    .hash-value {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      word-break: break-all;
    }

    pre.json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 0.78rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── History timeline ───────────────────────────────────────────────────── */
    .timeline { list-style: none; position: relative; padding-left: 20px; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 6px; top: 0; bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      padding: 12px 0 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .timeline-item:last-child { border-bottom: none; }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 18px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
    }

    .rev-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
    .rev-hash { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

    #history-loading { color: var(--muted); font-size: 0.875rem; padding: 10px 0; }

    /* ── Spinner ────────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Config screen ─────────────────────────────────────────────────────── -->
<div id="config-screen">
  <div class="config-card">
    <h1>AI Audit Ledger</h1>
    <p>Enter your API details to connect. These are saved in your browser only.</p>

    <label for="cfg-url">API Base URL</label>
    <input type="text" id="cfg-url" placeholder="https://xxxxxx.execute-api.eu-west-1.amazonaws.com/prod" />

    <label for="cfg-key">Read API Key</label>
    <input type="password" id="cfg-key" placeholder="your-read-key" />

    <div id="cfg-error" style="color:var(--danger);font-size:0.85rem;margin-bottom:14px;display:none;"></div>

    <button class="btn btn-primary" onclick="connect()">Connect</button>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────────────── -->
<div id="app">
  <header>
    <h1>AI Audit Ledger</h1>
    <span class="badge" id="tenant-badge">admin</span>
    <button class="btn btn-sm btn-outline" onclick="disconnect()">Disconnect</button>
  </header>

  <div class="toolbar">
    <label>From</label>
    <input type="date" id="filter-from" onchange="loadLogs()" />
    <label>To</label>
    <input type="date" id="filter-to" onchange="loadLogs()" />
    <div class="spacer"></div>
    <button class="btn btn-sm btn-outline" onclick="loadLogs()">&#8635; Refresh</button>
    <button class="btn btn-sm btn-outline" onclick="exportCsv()">Export CSV</button>
  </div>

  <div id="error-bar"></div>

  <div class="table-wrap">
    <div id="empty-state">
      <p style="font-size:1.1rem;margin-bottom:8px;">No records found</p>
      <p style="font-size:0.85rem;">Try adjusting the date filters or send a test event.</p>
    </div>
    <table id="log-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Event ID</th>
          <th>Model</th>
          <th>Tenant</th>
          <th>Human review</th>
        </tr>
      </thead>
      <tbody id="log-body">
        <tr id="loading-row"><td colspan="5">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Detail panel ──────────────────────────────────────────────────────── -->
<div id="overlay" onclick="closePanel()"></div>
<div id="panel">
  <div class="panel-header">
    <h2>Event detail</h2>
    <button class="btn btn-sm btn-outline" onclick="closePanel()">Close</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let API_BASE = '';
  let API_KEY  = '';
  let allRows  = [];

  // ── Config ─────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = loadConfig();
    if (saved) {
      API_BASE = saved.url;
      API_KEY  = saved.key;
      showApp();
    }
  });

  function loadConfig() {
    try {
      const s = localStorage.getItem('ail_config');
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  }

  function saveConfig(url, key) {
    localStorage.setItem('ail_config', JSON.stringify({ url, key }));
  }

  async function connect() {
    const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
    const key = document.getElementById('cfg-key').value.trim();
    const err = document.getElementById('cfg-error');

    if (!url || !key) {
      err.textContent = 'Both fields are required.';
      err.style.display = 'block';
      return;
    }

    err.style.display = 'none';

    // Quick connectivity check
    try {
      const r = await fetch(`${url}/audit/logs`, {
        headers: { 'x-api-key': key }
      });
      if (r.status === 401) {
        err.textContent = 'Invalid API key. Check and try again.';
        err.style.display = 'block';
        return;
      }
    } catch (e) {
      err.textContent = 'Could not reach the API. Check the URL and your internet connection.';
      err.style.display = 'block';
      return;
    }

    API_BASE = url;
    API_KEY  = key;
    saveConfig(url, key);
    showApp();
  }

  function disconnect() {
    localStorage.removeItem('ail_config');
    API_BASE = '';
    API_KEY  = '';
    allRows  = [];
    document.getElementById('app').style.display = 'none';
    document.getElementById('config-screen').style.display = 'flex';
  }

  // ── App ────────────────────────────────────────────────────────────────────
  function showApp() {
    document.getElementById('config-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Default date range: last 30 days
    const to   = new Date();
    const from = new Date();
    from.setDate(from.getDate() - 30);
    document.getElementById('filter-to').value   = to.toISOString().slice(0, 10);
    document.getElementById('filter-from').value = from.toISOString().slice(0, 10);

    loadLogs();
  }

  // ── Load logs ──────────────────────────────────────────────────────────────
  async function loadLogs() {
    showError(null);
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '<tr id="loading-row"><td colspan="5"><span class="spinner"></span></td></tr>';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('log-table').style.display = 'table';

    const from = document.getElementById('filter-from').value;
    const to   = document.getElementById('filter-to').value;

    let url = `${API_BASE}/audit/logs`;
    if (from && to) {
      url += `?from=${encodeURIComponent(from + 'T00:00:00Z')}&to=${encodeURIComponent(to + 'T23:59:59Z')}`;
    }

    try {
      const r = await fetch(url, { headers: { 'x-api-key': API_KEY } });
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        showError(`API error ${r.status}: ${body.error ?? 'Unknown error'}`);
        tbody.innerHTML = '';
        return;
      }

      const data = await r.json();
      allRows = data.items ?? [];

      // Update tenant badge
      const badge = document.getElementById('tenant-badge');
      badge.textContent = data.tenant_id ? `tenant: ${data.tenant_id}` : 'admin';

      renderTable(allRows);
    } catch (e) {
      showError('Failed to load logs. Check your connection.');
      tbody.innerHTML = '';
    }
  }

  function renderTable(rows) {
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';

    if (!rows.length) {
      document.getElementById('log-table').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.onclick = () => openPanel(row);

      const ts = row.timestamp
        ? new Date(row.timestamp).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' })
        : '—';
      const eventId = row.event_id ?? '—';
      const shortId = typeof eventId === 'string' ? eventId.slice(0, 8) + '…' : '—';
      const model   = row.model_version ?? '—';
      const tenant  = row.tenant_id ?? '—';
      const human   = row.human_in_loop;

      tr.innerHTML = `
        <td>${ts}</td>
        <td title="${eventId}" style="font-family:var(--mono);font-size:0.8rem">${shortId}</td>
        <td>${model}</td>
        <td>${tenant}</td>
        <td><span class="pill ${human ? 'pill-yes' : 'pill-no'}">${human ? 'Yes' : 'No'}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Detail panel ──────────────────────────────────────────────────────────
  function openPanel(row) {
    const body = document.getElementById('panel-body');

    const ts = row.timestamp
      ? new Date(row.timestamp).toLocaleString('en-GB', { dateStyle: 'long', timeStyle: 'medium' })
      : '—';

    body.innerHTML = `
      <div class="section-title">Event</div>
      <div class="field-row"><span class="field-label">Event ID</span><span class="field-value">${row.event_id ?? '—'}</span></div>
      <div class="field-row"><span class="field-label">Timestamp</span><span class="field-value">${ts}</span></div>
      <div class="field-row"><span class="field-label">Tenant</span><span class="field-value">${row.tenant_id ?? '—'}</span></div>
      <div class="field-row"><span class="field-label">Model version</span><span class="field-value">${row.model_version ?? '—'}</span></div>
      <div class="field-row"><span class="field-label">Human in loop</span><span class="field-value">${row.human_in_loop ? 'Yes' : 'No'}</span></div>

      <div class="section-title">Hashes (privacy-preserving)</div>
      <div class="field-row"><span class="field-label">System prompt hash</span></div>
      <div class="hash-value">${row.system_prompt_hash ?? '—'}</div>
      <br/>
      <div class="field-row"><span class="field-label">Input data hash</span></div>
      <div class="hash-value">${row.input_data_hash ?? '—'}</div>

      <div class="section-title">AI Decision Output</div>
      <pre class="json-block">${JSON.stringify(row.ai_decision_output ?? {}, null, 2)}</pre>

      <div class="section-title">Tamper-evidence check</div>
      <div id="history-loading"><span class="spinner"></span> Checking integrity…</div>
      <div id="history-result" style="display:none"></div>
    `;

    document.getElementById('overlay').style.display = 'block';
    document.getElementById('panel').classList.add('open');

    loadHistory(row.event_id);
  }

  async function loadHistory(eventId) {
    if (!eventId) return;
    try {
      const r = await fetch(`${API_BASE}/audit/events/${encodeURIComponent(eventId)}/history`, {
        headers: { 'x-api-key': API_KEY }
      });
      const data = await r.json();

      document.getElementById('history-loading').style.display = 'none';
      const result = document.getElementById('history-result');
      result.style.display = 'block';

      const verified = data.integrity_verified;
      const note     = data.integrity_note ?? '';
      const color    = verified ? 'var(--accent)' : verified === false ? 'var(--danger)' : 'var(--muted)';
      const icon     = verified ? '✓' : verified === false ? '✗' : '–';

      result.innerHTML = `
        <div style="padding:12px;border-radius:6px;background:${verified ? 'var(--accent-lt)' : verified === false ? '#fdecea' : 'var(--bg)'};border:1px solid ${color};margin-bottom:12px;">
          <div style="font-weight:700;color:${color};margin-bottom:4px;">${icon} ${verified ? 'Integrity verified' : verified === false ? 'Integrity check failed' : 'Integrity unknown'}</div>
          <div style="font-size:0.82rem;color:var(--muted)">${note}</div>
        </div>
        ${data.archived_record ? `
          <div class="section-title" style="margin-top:0">Archived record (S3 — immutable)</div>
          <pre class="json-block">${JSON.stringify(data.archived_record, null, 2)}</pre>
        ` : ''}
      `;

    } catch (e) {
      const el = document.getElementById('history-loading');
      if (el) el.textContent = 'Could not load integrity check.';
    }
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('overlay').style.display = 'none';
  }

  // ── Export CSV ─────────────────────────────────────────────────────────────
  function exportCsv() {
    if (!allRows.length) return;

    const headers = ['event_id', 'timestamp', 'tenant_id', 'model_version', 'human_in_loop', 'system_prompt_hash', 'input_data_hash'];
    const lines   = [headers.join(',')];

    allRows.forEach(row => {
      lines.push(headers.map(h => {
        const v = row[h] ?? '';
        const s = String(v).replace(/"/g, '""');
        return `"${s}"`;
      }).join(','));
    });

    const blob = new Blob([lines.join('\r\n')], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `audit-logs-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function showError(msg) {
    const bar = document.getElementById('error-bar');
    if (msg) {
      bar.textContent = msg;
      bar.style.display = 'block';
    } else {
      bar.style.display = 'none';
    }
  }
</script>
</body>
</html>
